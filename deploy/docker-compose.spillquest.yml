# SpillQuest (spillquest.com) — VPS Docker Compose
# Deploy: docker compose -f docker-compose.spillquest.yml up -d
#
# Standalone product: social party games + AI conversation prompts.
# No dependency on CortexDB, shre-router, or the Shre AI platform.

services:
  # ─── APIs ─────────────────────────────────────────────────────────────────

  # Prompts API (Spill cards — AI-generated conversation prompts)
  spill-api:
    build:
      context: ../../find-myself/apps/api
    restart: unless-stopped
    environment:
      PORT: "4000"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?required}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [spill]

  # Truth & Dare + Spin the Bottle API
  spill-games-api:
    build:
      context: ../../find-myself/apps/truth-dare-api
    restart: unless-stopped
    environment:
      PORT: "4001"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?required}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [spill]

  # Realtime — multiplayer rooms, Socket.io WebSocket server
  spill-realtime:
    build:
      context: ../../find-myself/apps/realtime-api
    restart: unless-stopped
    environment:
      PORT: "4002"
      REDIS_HOST: spill-redis
      REDIS_PORT: "6379"
    depends_on:
      spill-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [spill]

  # Insights API — retail analytics (PostgreSQL-backed)
  spill-insights:
    build:
      context: ../../find-myself/apps/insights-api
    restart: unless-stopped
    environment:
      PORT: "5555"
      DB_HOST: ${INSIGHTS_DB_HOST:-}
      DB_PORT: ${INSIGHTS_DB_PORT:-5432}
      DB_USER: ${INSIGHTS_DB_USER:-}
      DB_PASSWORD: ${INSIGHTS_DB_PASSWORD:-}
      DB_NAME: ${INSIGHTS_DB_NAME:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5555/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [spill]

  # ─── Frontend ─────────────────────────────────────────────────────────────

  # Web frontend (Expo static export)
  spill-web:
    build:
      context: ../../find-myself/apps/mobile
      args:
        EXPO_PUBLIC_API_URL: /api
        EXPO_PUBLIC_TRUTH_DARE_API_URL: /games-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [spill]

  # ─── Infrastructure ───────────────────────────────────────────────────────

  # Nginx reverse proxy — routes all SpillQuest traffic
  spill-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:4080:80"
    volumes:
      - ../../find-myself/config/nginx-vps.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - spill-web
      - spill-api
      - spill-games-api
      - spill-realtime
    networks: [spill]

  # Redis — pub/sub for realtime rooms, session store
  spill-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [spill]

networks:
  spill:
    driver: bridge
