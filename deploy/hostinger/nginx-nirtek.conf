# *.nirtek.net — Nginx Reverse Proxy (VPS host-level)
# /etc/nginx/sites-available/nirtek
#
# Routes all *.nirtek.net public subdomains to shre-auth-gate (:5431)
# running inside docker-compose.aros-retail.yml.
#
# Install: ln -s /etc/nginx/sites-available/nirtek /etc/nginx/sites-enabled/
# Cert:    certbot --nginx -d nirtek.net -d '*.nirtek.net'
#          (wildcard requires DNS challenge: certbot certonly --dns-cloudflare ...)

limit_req_zone $binary_remote_addr zone=nirtek_limit:10m rate=30r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name nirtek.net *.nirtek.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — all *.nirtek.net traffic through shre-auth-gate
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nirtek.net *.nirtek.net;

    # SSL — Let's Encrypt wildcard (DNS challenge via Cloudflare)
    ssl_certificate /etc/letsencrypt/live/nirtek.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nirtek.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml image/svg+xml;

    # Rate limiting
    limit_req zone=nirtek_limit burst=60 nodelay;
    limit_req_status 429;

    # WebSocket support
    proxy_http_version 1.1;

    # All traffic -> shre-auth-gate (Docker, port 5431)
    location / {
        proxy_pass http://127.0.0.1:5431;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    client_max_body_size 10m;

    access_log /var/log/nginx/nirtek-access.log;
    error_log /var/log/nginx/nirtek-error.log;
}
