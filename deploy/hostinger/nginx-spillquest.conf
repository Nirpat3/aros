# SpillQuest — Nginx Reverse Proxy (VPS host-level)
# /etc/nginx/sites-available/spillquest
#
# TLS termination + rate limiting. Proxies to Docker spill-nginx on :4080.
# Install: ln -s /etc/nginx/sites-available/spillquest /etc/nginx/sites-enabled/
# Cert:    certbot --nginx -d spillquest.com -d www.spillquest.com

limit_req_zone $binary_remote_addr zone=spill_limit:10m rate=60r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name spillquest.com www.spillquest.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spillquest.com www.spillquest.com;

    # SSL — Let's Encrypt (created by certbot)
    ssl_certificate /etc/letsencrypt/live/spillquest.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spillquest.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml image/svg+xml;

    # Rate limiting
    limit_req zone=spill_limit burst=120 nodelay;
    limit_req_status 429;

    # WebSocket support for realtime
    proxy_http_version 1.1;

    # All traffic -> Docker spill-nginx on port 4080
    location / {
        proxy_pass http://127.0.0.1:4080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    client_max_body_size 10m;

    access_log /var/log/nginx/spillquest-access.log;
    error_log /var/log/nginx/spillquest-error.log;
}
