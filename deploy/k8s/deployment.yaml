apiVersion: apps/v1
kind: Deployment
metadata:
  name: aros-platform
  labels:
    app: aros-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aros-platform
  template:
    metadata:
      labels:
        app: aros-platform
    spec:
      containers:
        - name: aros-web
          image: aros-platform:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: AROS_SECRET
              valueFrom:
                secretKeyRef:
                  name: aros-secrets
                  key: aros-secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aros-secrets
                  key: anthropic-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: aros-platform
spec:
  selector:
    app: aros-platform
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
